name: Check config.html is in sync

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check-config-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build config.html
        run: bash build.sh

      - name: Fail if config.html changed after build
        run: |
          git diff --exit-code -- config.html || {
            echo ""
            echo "ERROR: config.html is out of date."
            echo "Run 'bash build.sh' locally and commit the updated config.html."
            exit 1
          }
