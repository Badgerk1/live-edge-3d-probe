name: Check config.html is up to date

on:
  pull_request:

jobs:
  check-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rebuild config.html
        run: bash build.sh

      - name: Fail if config.html differs from committed version
        run: |
          git diff --exit-code config.html || {
            echo ""
            echo "ERROR: config.html is out of date."
            echo "Run 'bash build.sh' from the repo root and commit the updated config.html."
            exit 1
          }
